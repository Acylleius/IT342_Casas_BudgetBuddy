<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BudgetBuddy Dashboard</title>
  <link rel="stylesheet" href="../../shared/styles/variables.css">
  <link rel="stylesheet" href="../../shared/styles/components.css">
  <link rel="stylesheet" href="../../shared/styles/layout.css">
</head>
<body>
  <nav>
    <div class="nav-inner">
        <a class="brand" href="dashboard.html">BudgetBuddy</a>
      <div class="nav-links">
        <a href="../groups/groups.html">Groups</a>
        <a href="../inbox/inbox.html">Inbox</a>
        <a href="../profile/profile.html">Profile</a>
        <button id="logoutBtn" class="btn-secondary">Logout</button>
      </div>
    </div>
  </nav>
  <main class="page">
    <h1>Dashboard</h1>
    <section class="grid">
      <article class="card span-4">
        <div class="card-header"><h3>Balance</h3></div>
        <div class="card-body"><p id="balance" class="amount amount-pill income">₱0.00</p></div>
      </article>
      <article class="card span-4">
        <div class="card-header"><h3>Income</h3></div>
        <div class="card-body"><p id="income" class="amount amount-pill income">↑ ₱0.00</p></div>
      </article>
      <article class="card span-4">
        <div class="card-header"><h3>Expense</h3></div>
        <div class="card-body"><p id="expense" class="amount amount-pill expense">↓ ₱0.00</p></div>
      </article>
      <article class="card span-4">
        <div class="card-header"><h3>Add Transaction</h3></div>
        <div class="card-body">
          <form id="transactionForm">
            <div class="field">
              <label for="type">Type</label>
              <select id="type"><option>INCOME</option><option>EXPENSE</option></select>
            </div>
            <div class="field"><label for="amount">Amount</label><input id="amount" type="number" min="0.01" step="0.01" required></div>
            <div class="field"><label for="category">Category</label><input id="category" required></div>
            <button class="btn-primary" type="submit">Save</button>
          </form>
        </div>
      </article>
      <article class="card span-8">
        <div class="card-header"><h3>Recent Transactions</h3><span id="count" class="badge badge-income">0</span></div>
        <div id="transactions" class="card-body"><div class="empty-state">No transactions yet — add your first one!</div></div>
      </article>
      <article class="card span-12">
        <div class="card-header"><h3>Recent Activity</h3><span id="syncStatus" class="badge badge-member">Live</span></div>
        <div id="activity" class="card-body">
          <div class="list-row skeleton">&nbsp;</div>
          <div class="list-row skeleton">&nbsp;</div>
        </div>
      </article>
    </section>
  </main>
  <script type="module" src="../../shared/js/auth-guard.js"></script>
  <script type="module" src="dashboard.js"></script>
</body>
</html>
